<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Code-AR</title>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>

    <div id="overlay">
      <div id="header">
        <span id="app-name">Code-AR</span>
        <span id="scene-indicator">Scene <span id="current-scene">1</span> / 9</span>
      </div>

      <div id="topic-info">
        <span id="topic-label">HTML</span>
        <span id="scene-title">Struktur Dokumen</span>
      </div>

      <div id="scan-hint">
        <p>Arahkan kamera ke flashcard Code-AR</p>
      </div>

      <div id="nav-buttons">
        <button id="btn-prev" onclick="prevScene()">&#8592; Sebelumnya</button>
        <button id="btn-next" onclick="nextScene()">Lanjut &#8594;</button>
      </div>

      <div id="progress-bar">
        <div id="progress-fill"></div>
      </div>
    </div>


    <a-scene
      mindar-image="imageTargetSrc: markers/targets.mind; autoStart: true;"
      color-space="sRGB"
      renderer="colorManagement: true"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">

        <a-entity id="scene-1" visible="true">
          <a-plane position="0 0.1 0" width="1.8" height="1.1"
            color="#1a1a2e" opacity="0.92"></a-plane>

          <a-text value="Struktur Dokumen HTML"
            position="0 0.55 0.01" align="center"
            color="#E34C26" width="1.8"></a-text>

          <a-box position="0 0.28 0.05"
            width="0.9" height="0.14" depth="0.02" color="#E34C26"></a-box>
          <a-text value="<!DOCTYPE html>"
            position="0 0.28 0.07" align="center"
            color="#ffffff" width="1.4"></a-text>

          <a-box position="0 0.1 0.05"
            width="0.7" height="0.14" depth="0.02" color="#F06529"></a-box>
          <a-text value="<html>"
            position="0 0.1 0.07" align="center"
            color="#ffffff" width="1.0"></a-text>

          <a-box position="-0.45 -0.1 0.05"
            width="0.6" height="0.14" depth="0.02" color="#264de4"></a-box>
          <a-text value="<head>"
            position="-0.45 -0.1 0.07" align="center"
            color="#ffffff" width="0.9"></a-text>

          <a-box position="0.45 -0.1 0.05"
            width="0.6" height="0.14" depth="0.02" color="#2965f1"></a-box>
          <a-text value="<body>"
            position="0.45 -0.1 0.07" align="center"
            color="#ffffff" width="0.9"></a-text>

          <a-text value="DOCTYPE menandai awal dokumen HTML."
            position="0 -0.42 0.01" align="center"
            color="#aaaaaa" width="1.6"></a-text>
        </a-entity>

        <a-entity id="scene-2" visible="false">
          <a-plane position="0 0.1 0" width="1.8" height="1.1"
            color="#1a1a2e" opacity="0.92"></a-plane>

          <a-text value="Elemen dan Tag HTML"
            position="0 0.55 0.01" align="center"
            color="#E34C26" width="1.8"></a-text>

          <a-box position="-0.6 0.22 0.05"
            width="0.5" height="0.14" depth="0.02" color="#E34C26"></a-box>
          <a-text value="&lt;h1&gt;"
            position="-0.6 0.22 0.07" align="center"
            color="#fff" width="0.8"></a-text>
          <a-text value="Judul utama"
            position="-0.6 0.07 0.07" align="center"
            color="#aaa" width="0.8"></a-text>

          <a-box position="0 0.22 0.05"
            width="0.5" height="0.14" depth="0.02" color="#F06529"></a-box>
          <a-text value="&lt;p&gt;"
            position="0 0.22 0.07" align="center"
            color="#fff" width="0.8"></a-text>
          <a-text value="Paragraf"
            position="0 0.07 0.07" align="center"
            color="#aaa" width="0.8"></a-text>

          <a-box position="0.6 0.22 0.05"
            width="0.5" height="0.14" depth="0.02" color="#EB6421"></a-box>
          <a-text value="&lt;a&gt;"
            position="0.6 0.22 0.07" align="center"
            color="#fff" width="0.8"></a-text>
          <a-text value="Tautan"
            position="0.6 0.07 0.07" align="center"
            color="#aaa" width="0.8"></a-text>

          <a-box position="0 -0.1 0.05"
            width="0.5" height="0.14" depth="0.02" color="#D4500D"></a-box>
          <a-text value="&lt;img&gt;"
            position="0 -0.1 0.07" align="center"
            color="#fff" width="0.8"></a-text>
          <a-text value="Gambar"
            position="0 -0.25 0.07" align="center"
            color="#aaa" width="0.8"></a-text>

          <a-text value="Tag adalah blok pembangun halaman HTML."
            position="0 -0.42 0.01" align="center"
            color="#aaaaaa" width="1.6"></a-text>
        </a-entity>


        <a-entity id="scene-3" visible="false">
          <a-plane position="0 0.1 0" width="1.8" height="1.1"
            color="#1a1a2e" opacity="0.92"></a-plane>

          <a-text value="Atribut HTML"
            position="0 0.55 0.01" align="center"
            color="#E34C26" width="1.8"></a-text>

          <a-text value='&lt;a href="url" class="btn"&gt;Klik&lt;/a&gt;'

          <a-box position="-0.5 0.08 0.05"
            width="0.55" height="0.14" depth="0.02" color="#264de4"></a-box>

            position="-0.5 0.08 0.07" align="center"
            color="#fff" width="0.8"></a-text>
          <a-text value="Tujuan link"
            position="-0.5 -0.06 0.07" align="center"

          <a-box position="0.5 0.08 0.05"
            width="0.55" height="0.14" depth="0.02" color="#2965f1"></a-box>
          <a-text value="class"
            position="0.5 0.08 0.07" align="center"
            color="#fff" width="0.8"></a-text>
          <a-text value="Nama kelas CSS"
            position="0.5 -0.06 0.07" align="center"
            color="#aaa" width="0.8"></a-text>

          <a-box position="0 -0.2 0.05"
            width="0.55" height="0.14" depth="0.02" color="#1a56db"></a-box>
          <a-text value="alt / src"
            position="0 -0.2 0.07" align="center"
            color="#fff" width="0.8"></a-text>
          <a-text value="Untuk tag gambar"
            position="0 -0.34 0.07" align="center"
            color="#aaa" width="0.8"></a-text>

          <a-text value="Atribut memberi informasi tambahan pada elemen."
            position="0 -0.48 0.01" align="center"
            color="#aaaaaa" width="1.6"></a-text>
        </a-entity>


        <a-entity id="scene-4" visible="false">
          <a-plane position="0 0.1 0" width="1.8" height="1.1"
            color="#0d1b2a" opacity="0.92"></a-plane>

          <a-text value="Selektor dan Properti CSS"

            position="-0.55 0.08 0.07" align="center"

          <a-box position="0.1 0.08 0.05"
            width="0.6" height="0.14" depth="0.02" color="#1a56db"></a-box>
          <a-text value="Properti: color"
            position="0.1 0.08 0.07" align="center"
            color="#fff" width="1.0"></a-text>

          <a-box position="0 -0.12 0.05"
            width="0.52" height="0.14" depth="0.02" color="#0f3fa6"></a-box>
          <a-text value="Nilai: blue"
            position="0 -0.12 0.07" align="center"
            color="#fff" width="0.9"></a-text>

          <a-text value="CSS memilih elemen lalu memberi gaya padanya."
            position="0 -0.42 0.01" align="center"
            color="#aaaaaa" width="1.6"></a-text>
        </a-entity>


        <a-entity id="scene-5" visible="false">
          <a-plane position="0 0.1 0" width="1.8" height="1.1"
            color="#0d1b2a" opacity="0.92"></a-plane>

          <a-text value="Box Model CSS"
            position="0 0.55 0.01" align="center"
            color="#264de4" width="1.8"></a-text>

          <a-box position="0 0.12 0.01"
            width="1.1" height="0.62" depth="0.01"
            color="#e67e22" opacity="0.4"></a-box>
          <a-text value="Margin"
            position="-0.46 0.4 0.05" align="left"
            color="#e67e22" width="0.7"></a-text>

          <a-box position="0 0.12 0.02"
            width="0.88" height="0.46" depth="0.01"
            color="#e74c3c" opacity="0.55"></a-box>
          <a-text value="Border"
            position="-0.38 0.32 0.05" align="left"
            color="#e74c3c" width="0.7"></a-text>

          <a-box position="0 0.12 0.03"
            width="0.66" height="0.32" depth="0.01"
            color="#3498db" opacity="0.7"></a-box>
          <a-text value="Padding"
            position="-0.28 0.24 0.05" align="left"
            color="#3498db" width="0.7"></a-text>

          <a-box position="0 0.12 0.04"
            width="0.44" height="0.18" depth="0.01"
            color="#2ecc71"></a-box>
          <a-text value="Content"
            position="0 0.12 0.06" align="center"
            color="#fff" width="0.7"></a-text>

          <a-text value="Setiap elemen HTML adalah kotak berlapis."
            position="0 -0.38 0.01" align="center"
            color="#aaaaaa" width="1.6"></a-text>
        </a-entity>

        <a-entity id="scene-6" visible="false">
          <a-plane position="0 0.1 0" width="1.8" height="1.1"
            color="#0d1b2a" opacity="0.92"></a-plane>

          <a-text value="Flexbox Layout"
            position="0 0.55 0.01" align="center"
            color="#264de4" width="1.8"></a-text>

          <a-box position="-0.55 0.18 0.05"
            width="0.36" height="0.36" depth="0.06" color="#264de4"></a-box>
          <a-text value="1"
            position="-0.55 0.18 0.09" align="center"
            color="#fff" width="0.5"></a-text>

          <a-box position="0 0.18 0.05"
            width="0.36" height="0.36" depth="0.06" color="#2965f1"></a-box>
          <a-text value="2"
            position="0 0.18 0.09" align="center"
            color="#fff" width="0.5"></a-text>

          <a-box position="0.55 0.18 0.05"
            width="0.36" height="0.36" depth="0.06" color="#1a56db"></a-box>
          <a-text value="3"
            position="0.55 0.18 0.09" align="center"
            color="#fff" width="0.5"></a-text>

          <a-text value="display: flex; flex-direction: row;"
            position="0 -0.18 0.01" align="center"
            color="#2965f1" width="1.6"></a-text>

          <a-text value="Flexbox menyusun elemen dalam satu arah secara fleksibel."
            position="0 -0.42 0.01" align="center"
            color="#aaaaaa" width="1.6"></a-text>
        </a-entity>

          <a-box position="-0.55 0.18 0.05"
            width="0.46" height="0.36" depth="0.06" color="#b8860b"></a-box>
          <a-text value="var"
            position="-0.55 0.26 0.09" align="center"
            color="#fff" width="0.8"></a-text>
          <a-text value="Function Scope"
            position="-0.55 0.12 0.09" align="center"
            color="#ddd" width="0.8"></a-text>

          <a-box position="0 0.18 0.05"
            width="0.46" height="0.36" depth="0.06" color="#c8960c"></a-box>
          <a-text value="let"
            position="0 0.26 0.09" align="center"
            color="#fff" width="0.8"></a-text>
          <a-text value="Block Scope"
            position="0 0.12 0.09" align="center"
            color="#ddd" width="0.8"></a-text>

          <a-box position="0.55 0.18 0.05"
            width="0.46" height="0.36" depth="0.06" color="#F0DB4F"></a-box>
          <a-text value="const"
            position="0.55 0.26 0.09" align="center"
            color="#1a1600" width="0.8"></a-text>
          <a-text value="Tidak berubah"
            position="0.55 0.12 0.09" align="center"
            color="#333" width="0.8"></a-text>

          <a-text value="Variabel adalah wadah untuk menyimpan data."
            position="0 -0.42 0.01" align="center"
            color="#aaaaaa" width="1.6"></a-text>
        </a-entity>

          <a-box position="-0.62 0.18 0.05"

        </a-entity>

        <a-entity id="scene-9" visible="false">
          <a-plane position="0 0.1 0" width="1.8" height="1.1"
            color="#1a1600" opacity="0.92"></a-plane>

          <a-text value="Manipulasi DOM"
            position="0 0.55 0.01" align="center"
            color="#F0DB4F" width="1.8"></a-text>

          <a-box position="0 0.28 0.05"
            width="1.3" height="0.16" depth="0.02" color="#333"></a-box>
          <a-text value="document.getElementById('judul')"
            position="0 0.28 0.07" align="center"
            color="#F0DB4F" width="1.5"></a-text>
