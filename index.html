<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Code-AR</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>

    <div id="overlay">
      <div id="header">
        <span id="app-name">Code-AR</span>
        <span id="scene-indicator">Scene <span id="current-scene">1</span> / 15</span>
      </div>

      <div id="topic-info">
        <span id="topic-label">HTML</span>
        <span id="scene-title">Struktur Dokumen</span>
      </div>

      <div id="scan-hint">
        <p>Arahkan kamera ke flashcard Code-AR</p>
      </div>

      <div id="game-overlay" class="hidden">
        <div id="game-box">
          <div id="game-score-display">Skor: 0 / 4</div>
          <div id="game-wrong-display"></div>
          <div id="game-question-display">Memuat soal...</div>
          <div id="game-options">
            <button class="game-btn" id="game-btn-A">A</button>
            <button class="game-btn" id="game-btn-B">B</button>
            <button class="game-btn" id="game-btn-C">C</button>
            <button class="game-btn" id="game-btn-D">D</button>
          </div>
          <div id="game-feedback-display"></div>
          <div id="game-result-display"></div>
          <button id="game-retry-btn" class="hidden" onclick="retryGame()">🔄 Ulangi Game</button>
        </div>
      </div>

      <div id="nav-buttons">
        <button id="btn-prev" onclick="prevScene()">&#8592; Sebelumnya</button>
        <button id="btn-next" onclick="nextScene()">Lanjut &#8594;</button>
      </div>

      <div id="progress-bar">
        <div id="progress-fill"></div>
      </div>
    </div>

    <a-scene
      mindar-image="imageTargetSrc: markers/targets.mind; autoStart: true;"
      color-space="sRGB"
      renderer="colorManagement: true"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">

        <a-entity id="container-html"></a-entity>

        <a-entity id="container-css"></a-entity>

        <a-entity id="container-js"></a-entity>

        <a-entity id="container-robot"></a-entity>

      </a-entity>
    </a-scene>

    <script src="script.js"></script>
  </body>
</html>
