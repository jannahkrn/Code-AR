<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scene JavaScript - Code-AR</title>
</head>

<body>

    <a-entity id="scene-7" visible="false">

        <a-plane position="0 0.1 0" width="1.8" height="1.1" color="#1a1a2e" opacity="0.92">
        </a-plane>

        <a-text value="Variabel dan Tipe Data" position="0 0.55 0.01" align="center" color="#F7DF1E" width="1.8">
        </a-text>

        <a-box
    id="var-box"
    class="clickable"
    position="-0.6 0.15 0.05"
    width="0.42"
    height="0.14"
    depth="0.02"
    color="#e74c3c">
</a-box>
        <a-text value="var" position="-0.6 0.15 0.07" align="center" color="#000000" width="0.7">
        </a-text>
        <a-text value='"Halo"' position="-0.6 0.01 0.07" align="center" color="#aaaaaa" width="0.8">
        </a-text>

       <a-box
    id="let-box"
    class="clickable"
    position="0 0.15 0.05"
    width="0.42"
    height="0.14"
    depth="0.02"
    color="#3498db">
</a-box>
        <a-text value="let" position="0 0.15 0.07" align="center" color="#000000" width="0.7">
        </a-text>
        <a-text value="25" position="0 0.01 0.07" align="center" color="#aaaaaa" width="0.8">
        </a-text>

        <a-box
    id="const-box"
    class="clickable"
    position="0.6 0.15 0.05"
    width="0.42"
    height="0.14"
    depth="0.02"
    color="#2ecc71">
</a-box>
        <a-text value="const" position="0.6 0.15 0.07" align="center" color="#000000" width="0.7">
        </a-text>
        <a-text value="true" position="0.6 0.01 0.07" align="center" color="#aaaaaa" width="0.8">
        </a-text>

        <a-text value="String" position="-0.6 -0.15 0.07" align="center" color="#6699ff" width="0.8">
        </a-text>

        <a-text value="Number" position="0 -0.15 0.07" align="center" color="#6699ff" width="0.8">
        </a-text>

        <a-text value="Boolean" position="0.6 -0.15 0.07" align="center" color="#6699ff" width="0.8">
        </a-text>

        <a-text value="Variabel adalah wadah untuk menyimpan data." position="0 -0.34 0.01" align="center"
            color="#aaaaaa" width="1.6">
        </a-text>

        <a-text value="JavaScript memiliki var, let, dan const." position="0 -0.46 0.01" align="center"
            color="#888888" width="1.6">
        </a-text>

        <a-text
    id="js-info"
    value="Tap var, let, atau const untuk melihat penjelasan"
    position="0 -0.26 0.07"
    align="center"
    color="#F7DF1E"
    width="1.6">
</a-text>

    </a-entity>


    <a-entity id="scene-8" visible="false">

    <a-plane position="0 0.1 0" width="1.8" height="1.1" color="#1a1a2e" opacity="0.92">
    </a-plane>

    <a-text value="Function (Fungsi)" position="0 0.55 0.01" align="center" color="#F7DF1E" width="1.8">
    </a-text>

    <a-box
    id="input-box"
    class="clickable"
    position="-0.6 0.15 0.05"
    width="0.35"
    height="0.14"
    depth="0.02"
    color="#3498db">
</a-box>

    <a-text value="Input"
        position="-0.6 0.15 0.07"
        align="center"
        color="#ffffff"
        width="0.6">
    </a-text>

    <a-box position="0 0.15 0.05"
        width="0.5"
        height="0.14"
        depth="0.02"
        color="#F7DF1E">
    </a-box>

    <a-text value="kaliDua()"
        position="0 0.15 0.07"
        align="center"
        color="#000000"
        width="0.8">
    </a-text>

    <a-box position="0.6 0.15 0.05"
        width="0.35"
        height="0.14"
        depth="0.02"
        color="#2ecc71">
    </a-box>

    <a-text value="Output"
        position="0.6 0.15 0.07"
        align="center"
        color="#ffffff"
        width="0.6">
    </a-text>

    <a-text value="=>"
        position="-0.3 0.15 0.07"
        align="center"
        color="#ffffff"
        width="0.5">
    </a-text>

    <a-text value="=>"
        position="0.3 0.15 0.07"
        align="center"
        color="#ffffff"
        width="0.5">
    </a-text>

    <a-plane position="0 -0.08 0.04"
        width="1.4"
        height="0.2"
        color="#111111"
        opacity="0.9">
    </a-plane>

    <a-text value="function kaliDua(x){ return x*2; }"
        position="0 -0.08 0.06"
        align="center"
        color="#F7DF1E"
        width="1.4">
    </a-text>

    <a-text id="function-result"
        value="Tap Input untuk mencoba fungsi"
        position="0 -0.24 0.06"
        align="center"
        color="#66ff99"
        width="1.5">
    </a-text>

    <a-text value="Fungsi adalah blok kode yang dapat dipanggil berulang kali."
        position="0 -0.36 0.01"
        align="center"
        color="#aaaaaa"
        width="1.6">
    </a-text>

    <a-text value="Input diproses lalu menghasilkan output."
        position="0 -0.46 0.01"
        align="center"
        color="#888888"
        width="1.6">
    </a-text>

</a-entity>


    <a-entity id="scene-9" visible="false">

    <a-plane position="0 0.1 0" width="1.8" height="1.1" color="#1a1a2e" opacity="0.92">
    </a-plane>

    <a-text value="Manipulasi DOM"
        position="0 0.55 0.01"
        align="center"
        color="#F7DF1E"
        width="1.8">
    </a-text>

    <a-plane position="0 0.16 0.04"
        width="1.2"
        height="0.45"
        color="#ffffff">
    </a-plane>

    <a-text id="dom-title"
        value="Halo Dunia"
        position="0 0.28 0.06"
        align="center"
        color="#000000"
        width="0.9">
    </a-text>

    <a-box
    id="dom-button"
    class="clickable"
    position="0 0.02 0.05"
    width="0.45"
    height="0.12"
    depth="0.02"
    color="#3498db">
</a-box>

    <a-text value="Ubah Teks"
        position="0 0.02 0.07"
        align="center"
        color="#ffffff"
        width="0.7">
    </a-text>

    <a-plane position="0 -0.18 0.04"
        width="1.45"
        height="0.18"
        color="#111111"
        opacity="0.9">
    </a-plane>

    <a-text value="document.getElementById('judul').innerHTML"
        position="0 -0.18 0.06"
        align="center"
        color="#F7DF1E"
        width="1.45">
    </a-text>

    <a-text id="dom-info"
        value="Tap tombol untuk mengubah isi halaman"
        position="0 -0.30 0.06"
        align="center"
        color="#66ff99"
        width="1.5">
    </a-text>

    <a-text value="DOM adalah representasi struktur halaman web."
        position="0 -0.40 0.01"
        align="center"
        color="#aaaaaa"
        width="1.6">
    </a-text>

    <a-text value="JavaScript dapat mengubah teks dan elemen HTML."
        position="0 -0.50 0.01"
        align="center"
        color="#888888"
        width="1.6">
    </a-text>

</a-entity>

</body>

</html>
